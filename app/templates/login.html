<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Login - PM2Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#09090b] h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-2xl">
        <h2 class="text-2xl font-bold text-white mb-2">PM2Dash Login</h2>
        <p class="text-zinc-400 text-sm mb-6">계정 정보를 입력하여 관리자 대시보드에 접속하세요.</p>
        
        <form action="/login" method="post" class="space-y-4">
            <div>
                <label class="block text-zinc-400 text-xs font-bold mb-1 uppercase">Username</label>
                <input type="text" name="username" required class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 text-white outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-zinc-400 text-xs font-bold mb-1 uppercase">Password</label>
                <input type="password" name="password" required class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 text-white outline-none focus:border-blue-500 transition">
            </div>
            {% if error %}
            <p class="text-red-500 text-xs font-medium">{{ error }}</p>
            {% endif %}
            <button type="submit" class="w-full bg-white text-black font-bold py-2.5 rounded-lg hover:bg-zinc-200 transition mt-4">로그인</button>
        </form>
    </div>
</body>
</html>
