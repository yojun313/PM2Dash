<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - PM2Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#09090b] min-h-screen flex items-center justify-center p-4 sm:p-6">
    <div class="w-full max-w-sm sm:max-w-md bg-zinc-900 border border-zinc-800 p-6 sm:p-8 rounded-2xl shadow-2xl">
        <h2 class="text-xl sm:text-2xl font-bold text-white mb-2">PM2Dash Login</h2>
        <p class="text-zinc-400 text-sm mb-6">계정 정보를 입력하여 관리자 대시보드에 접속하세요.</p>
        
        <form action="/login" method="post" class="space-y-5">
            <div>
                <label class="block text-zinc-400 text-xs font-bold mb-1.5 uppercase tracking-wider">Username</label>
                <input type="text" name="username" required 
                    class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-white text-base outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition appearance-none">
            </div>
            <div>
                <label class="block text-zinc-400 text-xs font-bold mb-1.5 uppercase tracking-wider">Password</label>
                <input type="password" name="password" required 
                    class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-white text-base outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition appearance-none">
            </div>
            {% if error %}
            <div class="bg-red-500/10 border border-red-500/20 rounded-lg p-3">
                <p class="text-red-500 text-xs font-medium text-center">{{ error }}</p>
            </div>
            {% endif %}
            <button type="submit" 
                class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-zinc-200 active:scale-[0.98] transition-all mt-2 text-base">
                로그인
            </button>
        </form>
    </div>
</body>
</html>
