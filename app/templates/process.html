<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM2Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #fafafa;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .scale-up-animation {
            animation: scaleUp 0.2s ease-out;
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #09090b;
        }

        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="mb-8 flex flex-col xl:flex-row xl:items-end justify-between gap-6">
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight">Process Manager</h2>
                <p class="text-zinc-400 text-sm">실시간 프로세스 모니터링 및 자원 제어</p>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-3 w-full xl:w-auto">
                <!-- Startup 상태 배지 -->
                <div id="startupBadge" class="px-3 py-2 rounded-lg text-[11px] font-bold border border-zinc-800 bg-zinc-900/50 text-zinc-500 transition-all">
                    STARTUP: CHECKING...
                </div>

                <div class="relative w-full sm:w-64">
                    <input type="text" id="procSearch" onkeyup="filterProcesses()" placeholder="프로세스 검색..." 
                           class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2 text-sm focus:border-blue-500 outline-none transition shadow-inner text-white">
                    <svg class="absolute right-3 top-2.5 text-zinc-500" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" x2="16.65" y1="21" y2="16.65"></line></svg>
                </div>

                <!-- Save 버튼 -->
                <button onclick="savePM2()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    저장 (Save)
                </button>

                <button onclick="location.reload()" class="w-full sm:w-auto bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-4 py-2 rounded-lg text-sm font-bold transition flex items-center justify-center gap-2 border border-zinc-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M8 16H3v5"></path></svg>
                    새로고침
                </button>
            </div>
        </div>

        <div class="card rounded-2xl overflow-hidden border border-zinc-800 bg-zinc-900/30">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead>
                        <tr class="text-zinc-500 border-b border-zinc-800 bg-zinc-900/50">
                            <th class="p-4 font-bold uppercase tracking-wider text-[10px]">Name & ID</th>
                            <th class="p-4 font-bold uppercase tracking-wider text-[10px]">Status</th>
                            <th class="p-4 font-bold uppercase tracking-wider text-[10px]">CPU Usage</th>
                            <th class="p-4 font-bold uppercase tracking-wider text-[10px]">Memory</th>
                            <th class="p-4 font-bold uppercase tracking-wider text-[10px]">Uptime</th>
                            <th class="p-4 font-bold uppercase tracking-wider text-[10px]">Watch</th>
                            <th class="p-4 font-bold uppercase tracking-wider text-[10px] text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pm2-list-body">
                        {% for proc in processes %}
                        <tr id="proc-{{ proc.name }}" class="proc-row border-b border-zinc-800/50 hover:bg-zinc-800/20 transition-colors" data-name="{{ proc.name }}">
                            <td class="p-4">
                                <div class="font-bold text-zinc-100">{{ proc.name }}</div>
                                <div class="text-[10px] text-zinc-500 uppercase font-mono mt-0.5">PM2 ID: {{ proc.pm_id }}</div>
                            </td>
                            <td class="p-4 status-cell">
                                <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-md text-[10px] font-bold bg-zinc-800 text-zinc-500">
                                    LOADING
                                </span>
                            </td>
                            <td class="p-4">
                                <span class="cpu-cell font-mono text-zinc-400 bg-black/40 px-2 py-1 rounded border border-zinc-800/50 text-xs">0%</span>
                            </td>
                            <td class="p-4">
                                <span class="mem-cell font-mono text-zinc-400 text-xs">0 MB</span>
                            </td>
                            <td class="p-4">
                                <span class="uptime-cell text-zinc-500 text-xs">-</span>
                            </td>
                            <td class="p-4">
                                <button onclick="toggleWatch('{{ proc.name }}')" class="hover:opacity-80 transition-opacity">
                                    <span class="watch-status-badge inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold bg-zinc-800 text-zinc-600 border border-zinc-700">
                                        -
                                    </span>
                                </button>
                            </td>
                            <td class="p-4 text-right">
                                <div class="flex justify-end gap-2">
                                    <button onclick="openLogModal('{{ proc.name }}')" class="p-2 bg-blue-900/10 text-blue-400 hover:bg-blue-600 hover:text-white rounded-lg transition" title="Logs">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 18 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
                                    </button>
                                    <button onclick="controlPM2('restart', '{{ proc.name }}')" class="p-2 bg-zinc-800 text-zinc-300 hover:bg-zinc-100 hover:text-black rounded-lg transition" title="Restart">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
                                    </button>
                                    <button onclick="controlPM2('stop', '{{ proc.name }}')" class="p-2 bg-red-900/10 text-red-500 hover:bg-red-600 hover:text-white rounded-lg transition" title="Stop">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
                                    </button>
                                    <button onclick="controlPM2('delete', '{{ proc.name }}')" class="p-2 bg-orange-900/10 text-orange-500 hover:bg-orange-600 hover:text-white rounded-lg transition" title="Delete">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Log Modal -->
    <div id="logModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-900 border border-zinc-800 w-full max-w-5xl h-[75vh] rounded-2xl flex flex-col overflow-hidden shadow-2xl scale-up-animation">
            <div class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900">
                <div class="flex items-center gap-2">
                    <div class="flex gap-1.5 mr-2">
                        <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                    </div>
                    <h3 id="logTitle" class="font-bold text-white text-sm font-mono tracking-wider uppercase">PROCESS LOGS</h3>
                </div>
                <button onclick="closeLogModal()" class="text-zinc-500 hover:text-white transition p-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="logContainer" class="flex-1 p-4 font-mono text-[11px] overflow-y-auto bg-black text-zinc-300 space-y-0.5 selection:bg-blue-500/30">
                <div class="text-zinc-500 italic">Connecting to log stream...</div>
            </div>
        </div>
    </div>

    <script>
        let logSocket = null;

        // Startup 상태 확인
        async function checkStartupStatus() {
            try {
                const response = await fetch('/startup-status');
                const data = await response.json();
                const badge = document.getElementById('startupBadge');
                if (data.is_registered) {
                    badge.innerText = "STARTUP: REGISTERED";
                    badge.className = "px-3 py-2 rounded-lg text-[11px] font-bold border border-green-500/20 bg-green-500/10 text-green-500";
                } else {
                    badge.innerText = "STARTUP: NOT REGISTERED";
                    badge.className = "px-3 py-2 rounded-lg text-[11px] font-bold border border-orange-500/20 bg-orange-500/10 text-orange-400";
                }
            } catch (err) {
                console.error("Startup check failed");
            }
        }

        // PM2 상태 업데이트
        async function updateStats() {
            try {
                const response = await fetch('/status'); 
                if (!response.ok) return;
                const processes = await response.json();

                processes.forEach(proc => {
                    const row = document.getElementById(`proc-${proc.name}`);
                    if (!row) return;

                    const statusCell = row.querySelector('.status-cell');
                    const status = proc.pm2_env.status;
                    const isOnline = status === 'online';
                    statusCell.innerHTML = `
                        <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-md text-[10px] font-bold ${isOnline ? 'bg-green-500/10 text-green-500 border border-green-500/20' : 'bg-red-500/10 text-red-500 border border-red-500/20'}">
                            <span class="w-1 h-1 rounded-full ${isOnline ? 'bg-green-500 animate-pulse' : 'bg-red-500'}"></span> ${status.toUpperCase()}
                        </span>
                    `;

                    row.querySelector('.cpu-cell').innerText = `${proc.monit.cpu}%`;
                    const memMB = (proc.monit.memory / 1024 / 1024).toFixed(1);
                    row.querySelector('.mem-cell').innerText = `${memMB} MB`;
                    row.querySelector('.uptime-cell').innerText = formatUptime(proc.pm2_env.pm_uptime);

                    const watchBadge = row.querySelector('.watch-status-badge');
                    const isWatching = proc.pm2_env.watch;
                    watchBadge.innerText = isWatching ? "WATCH ON" : "WATCH OFF";
                    watchBadge.className = `watch-status-badge inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold ${
                        isWatching 
                        ? 'bg-blue-500/10 text-blue-400 border border-blue-500/20' 
                        : 'bg-zinc-800 text-zinc-500 border border-zinc-700'
                    }`;
                });
            } catch (err) {
                console.error("Update failed:", err);
            }
        }

        function filterProcesses() {
            const query = document.getElementById('procSearch').value.toLowerCase();
            const rows = document.getElementsByClassName('proc-row');
            for (let row of rows) {
                const name = row.getAttribute('data-name').toLowerCase();
                row.style.display = name.includes(query) ? "" : "none";
            }
        }

        function formatUptime(ms) {
            if (!ms) return "-";
            const seconds = Math.floor((Date.now() - ms) / 1000);
            if (seconds < 60) return `${seconds}s`;
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h`;
            return `${Math.floor(hours / 24)}d`;
        }

        async function controlPM2(action, name) {
            const actionKo = {
                'restart': '재시작',
                'stop': '중지',
                'delete': '삭제(리스트에서 제거)'
            }[action] || action;
        
            if (!confirm(`${name} 프로세스를 ${actionKo} 하시겠습니까?`)) return;
            
            try {
                const response = await fetch(`/control/${action}/${name}`, { method: 'POST' });
                if (response.ok) {
                    if (action === 'delete') {
                        location.reload(); 
                    } else {
                        updateStats();
                    }
                } else {
                    alert('명령 실행 실패');
                }
            } catch (err) {
                alert('서버 통신 오류');
            }
        }

        // PM2 Save 실행
        async function savePM2() {
            if (!confirm("현재 프로세스 리스트를 저장하시겠습니까? 재부팅 시 이 상태로 자동 복구됩니다.")) return;
            try {
                const response = await fetch('/save', { method: 'POST' });
                if (response.ok) {
                    alert("성공적으로 저장되었습니다 (pm2 save)");
                } else {
                    alert("저장 실패");
                }
            } catch (err) {
                alert("서버 통신 오류");
            }
        }
        
        async function toggleWatch(name) {
            try {
                const response = await fetch(`/toggle-watch/${name}`, { method: 'POST' });
                if (response.ok) {
                    updateStats();
                } else {
                    alert('Watch 모드 변경 실패');
                }
            } catch (err) {
                alert('서버 통신 오류');
            }
        }

        function openLogModal(name) {
            const modal = document.getElementById('logModal');
            const container = document.getElementById('logContainer');
            const title = document.getElementById('logTitle');
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            title.innerText = `REAL-TIME LOGS: ${name}`;
            container.innerHTML = '<div class="text-zinc-600 italic px-2">데이터를 불러오는 중입니다...</div>';

            if (logSocket) logSocket.close();

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            logSocket = new WebSocket(`${protocol}//${window.location.host}/ws/logs/${name}`);

            logSocket.onmessage = function(event) {
                const line = document.createElement('div');
                line.className = 'border-l border-zinc-800 pl-3 py-0.5 hover:bg-zinc-800/40 transition-colors whitespace-pre-wrap break-all';
                line.innerText = event.data;
                container.appendChild(line);
                container.scrollTop = container.scrollHeight;
            };

            logSocket.onclose = function() {
                const msg = document.createElement('div');
                msg.className = 'text-zinc-600 text-[10px] mt-4 text-center border-t border-zinc-800 pt-4 font-bold tracking-widest';
                msg.innerText = "로그 스트림 종료됨 (STREAM ENDED)";
                container.appendChild(msg);
            };

            logSocket.onerror = function() {
                container.innerHTML = '<div class="text-red-500 font-bold p-2">WebSocket 연결 오류 발생</div>';
            };
        }

        function closeLogModal() {
            if (logSocket) {
                logSocket.close();
                logSocket = null;
            }
            document.getElementById('logModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        setInterval(updateStats, 1000);
        updateStats();
        checkStartupStatus();

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLogModal();
        });
    </script>
</body>
</html>
